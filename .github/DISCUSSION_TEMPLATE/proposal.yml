title: "Proposal"
labels: ["proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for starting a proposal discussion.
        Please fill out the fields below as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this important?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected Impact
      description: What changes if this is implemented?
    validations:
      required: true

  - type: textarea
    id: understanding
    attributes:
      label: Understanding
      description: Explain, in your own words, how this fits the project.
    validations:
      required: true