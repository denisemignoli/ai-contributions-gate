- name: Comment and close PR
  if: steps.check.outputs.vouched == 'false'
  uses: actions/github-script@v7
  with:
    script: |
      const prNumber = context.payload.pull_request.number;
      const author = context.payload.pull_request.user.login;

      const message =
        "👋 Obrigado pela contribuição, @" + author + "!\n\n" +
        "Este repositório utiliza um sistema de vouch.\n\n" +
        "PRs de usuários não-vouched são automaticamente fechados.\n\n" +
        "Para contribuir:\n" +
        "1. Abra uma Discussion em 'Vouch Request'\n" +
        "2. Aguarde aprovação\n" +
        "3. Depois abra PR\n\n" +
        "Obrigado 🙏";

      await github.rest.issues.createComment({
        owner: context.repo.owner,
        repo: context.repo.repo,
        issue_number: prNumber,
        body: message
      });

      await github.rest.pulls.update({
        owner: context.repo.owner,
        repo: context.repo.repo,
        pull_number: prNumber,
        state: "closed"
      });