name: Block Unvouched PRs

on:
  pull_request:
    types: [opened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check vouched user
        run: |
          if ! grep -q "$ACTOR" .github/VOUCHED.md; then
            echo "User not vouched"
            exit 1
          fi
        env:
          ACTOR: ${{ github.actor }}